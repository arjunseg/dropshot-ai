name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dropshot
          POSTGRES_PASSWORD: dropshot
          POSTGRES_DB: dropshot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Lint
        run: poetry run ruff check .

      - name: Type check
        run: poetry run mypy app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://dropshot:dropshot@localhost:5432/dropshot_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test_secret_key_not_for_production
          ANTHROPIC_API_KEY: sk-ant-test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_S3_BUCKET: test-bucket
        run: poetry run pytest --cov=app --cov-report=xml -v
