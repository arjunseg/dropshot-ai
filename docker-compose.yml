version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dropshot
      POSTGRES_PASSWORD: dropshot
      POSTGRES_DB: dropshot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropshot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: dropshot
      MINIO_ROOT_PASSWORD: dropshotpass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 dropshot dropshotpass;
      mc mb --ignore-existing local/dropshot-videos;
      mc anonymous set download local/dropshot-videos;
      exit 0
      "

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://dropshot:dropshot@postgres:5432/dropshot
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: dropshot
      AWS_SECRET_ACCESS_KEY: dropshotpass
      AWS_S3_BUCKET: dropshot-videos
      AWS_S3_REGION: us-east-1
      AWS_S3_ENDPOINT_URL: http://minio:9000
      JWT_SECRET_KEY: dev_secret_change_in_production_please_use_64_bytes
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      JWT_REFRESH_EXPIRE_DAYS: 30
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: claude-sonnet-4-6
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-price_placeholder}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      PADDLE_MODEL_PATH: /app/models/paddle_detector_v1.pt
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_cache:/app/models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://dropshot:dropshot@postgres:5432/dropshot
      REDIS_URL: redis://redis:6379/0
      AWS_ACCESS_KEY_ID: dropshot
      AWS_SECRET_ACCESS_KEY: dropshotpass
      AWS_S3_BUCKET: dropshot-videos
      AWS_S3_REGION: us-east-1
      AWS_S3_ENDPOINT_URL: http://minio:9000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: claude-sonnet-4-6
      PADDLE_MODEL_PATH: /app/models/paddle_detector_v1.pt
      PIPELINE_TARGET_FPS: "30"
      PIPELINE_MAX_VIDEO_BYTES: "524288000"
      PADDLE_CONFIDENCE_THRESHOLD: "0.7"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - model_cache:/app/models
    command: celery -A app.pipeline.tasks worker --loglevel=info --concurrency=2 -Q video_analysis

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:
